name: lint:ci and test

on:
    pull_request:
        branches: [ master ]

jobs:
    lint_and_test:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v2
        - name: Use NodeJS
          uses: actions/setup-node@v2lint
          with: 
            node-version: 18.x
            cache: npm
        - run: npm i
        - run: npm run lint:ci
        - run: npm run test
            